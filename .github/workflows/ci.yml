name: Build & Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            name: lrn-linux-x86_64
            extension: ""
            strip: true
          - os: macos-latest
            target: x86_64-apple-darwin
            name: lrn-macos-intel-x86_64
            extension: ""
            strip: false
          - os: macos-14
            target: aarch64-apple-darwin
            name: lrn-macos-arm64
            extension: ""
            strip: false
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: lrn-windows-x86_64
            extension: .exe
            strip: false

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Strip binary (Linux)
        if: matrix.strip == true
        run: strip target/${{ matrix.target }}/release/lrn${{ matrix.extension }}

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "Release ${{ github.ref_name }}" \
            --generate-notes \
            target/${{ matrix.target }}/release/lrn${{ matrix.extension }}
