name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            name: lrn-linux-x86_64
            extension: ""
          - os: macos-latest
            target: x86_64-apple-darwin
            name: lrn-macos-intel-x86_64
            extension: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: lrn-windows-x86_64
            extension: .exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload binary artifact
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: target/${{ matrix.target }}/release/lrn${{ matrix.extension }}

      - name: Install NSIS
        if: runner.os == 'Windows'
        run: choco install nsis --no-progress
        shell: pwsh

      - name: Create Windows installer (NSIS)
        if: runner.os == 'Windows'
        run: |
          & "C:\Program Files (x86)\NSIS\makensis.exe" /DNSIS_ARCH=x86_64 nsis/installer.nsi

      - name: Upload Windows artifacts
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: lrn-windows-x86_64
          path: |
            target/x86_64-pc-windows-msvc/release/lrn.exe
            target\nsis-x86_64\release\lrn-installer.exe

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: lrn-*/*
          generate_release_notes: true
